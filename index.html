<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Calculadora HP-12C (TVM) - JS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calc hp12c">
      <div class="display-row">
        <div class="status">HP-12C JS</div>
        <div id="display" class="display">0</div>
      </div>

      <div class="keys">
        <div class="row">
          <button class="btn gold" data-fn="f">f</button>
          <button class="btn blue" data-fn="g">g</button>
          <button class="btn small" data-fn="sto">STO</button>
          <button class="btn small" data-fn="rcl">RCL</button>
          <button class="btn small enter" data-fn="enter">ENTER</button>
        </div>

        <div class="row">
          <button class="btn orange" data-fn="n">n</button>
          <button class="btn orange" data-fn="i">i%</button>
          <button class="btn orange" data-fn="pv">PV</button>
          <button class="btn orange" data-fn="pmt">PMT</button>
          <button class="btn orange" data-fn="fv">FV</button>
        </div>

        <div class="row">
          <button class="btn" data-fn="7">7</button>
          <button class="btn" data-fn="8">8</button>
          <button class="btn" data-fn="9">9</button>
          <button class="btn" data-fn="div">÷</button>
          <button class="btn" data-fn="sqrt">√</button>
        </div>

        <div class="row">
          <button class="btn" data-fn="4">4</button>
          <button class="btn" data-fn="5">5</button>
          <button class="btn" data-fn="6">6</button>
          <button class="btn" data-fn="mul">×</button>
          <button class="btn" data-fn="x2">x²</button>
        </div>

        <div class="row">
          <button class="btn" data-fn="1">1</button>
          <button class="btn" data-fn="2">2</button>
          <button class="btn" data-fn="3">3</button>
          <button class="btn" data-fn="sub">−</button>
          <button class="btn" data-fn="1overx">1/x</button>
        </div>

        <div class="row">
          <button class="btn" data-fn="0">0</button>
          <button class="btn" data-fn="dot">.</button>
          <button class="btn" data-fn="chs">+/-</button>
          <button class="btn" data-fn="add">+</button>
          <button class="btn" data-fn="pow">x^y</button>
        </div>

        <div class="row">
          <button class="btn small" data-fn="mplus">M+</button>
          <button class="btn small" data-fn="mminus">M-</button>
          <button class="btn small" data-fn="mr">MR</button>
          <button class="btn small" data-fn="clear">CLx</button>
          <button class="btn small" data-fn="allclear">C</button>
        </div>

        <div class="info">
          <div>
            Modo: <span id="mode">RPN</span> — Use `f` para calcular TVM
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
